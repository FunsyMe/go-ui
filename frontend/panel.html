<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/page.css">
    <title>panel</title>
</head>
<body>
    <div class="box-place">
        <div class="box-line">
            <div class="box box-huge-x">
                <img src="images/drive.svg" class="card-image" style="background-color: #1364c7; outline: 4px solid #1364c752;">
                <div class="box-info">
                    <div class="box-title">Всего прокси</div>
                    <div class="box-data">10</div>
                    <div class="box-data-2">Онлайн: 1</div>
                </div>
            </div>
            <div class="box box-huge-x">
                <img src="images/connections.svg" class="card-image" style="background-color: #169a53; outline: 4px solid #169a5352;">
                <div class="box-info">
                    <div class="box-title">Текущие соединения</div>
                    <div class="box-data">20</div>
                    <div class="box-data-2">Максимум: 100</div>
                </div>
            </div>
            <div class="box box-huge-x">
                <img src="images/traffic.svg" class="card-image" style="background-color: #6a36bb; outline: 4px solid #6a36bb52;">
                <div class="box-info">
                    <div class="box-title">Трафик</div>
                    <div class="box-data">10.0 GB</div>
                    <div class="box-data-2" style="color: #5297ec;">Входящий: <span class="incoming-traffic">2.1 GB</span></div>
                    <div class="box-data-2" style="color: #9666e4;">Исходящиий: <span class="outgoing-traffic">7.9 GB</span></div>
                </div>
            </div>
            <div class="box box-huge-x">
                <img src="images/ping.svg" class="card-image" style="background-color: #c08114; outline: 4px solid #c0811452;">
                <div class="box-info">
                    <div class="box-title">Пинг</div>
                    <div class="box-data">42 ms</div>
                    <div class="box-data-2">Минимум: <span class="min-ping" style="color: #6fe4a6;">30 ms</span></div>
                    <div class="box-data-2">Максимум <span class="max-ping" style="color: #cea96a;">72 ms</span></div>
                </div>
            </div>
        </div>

        <div class="box-line">
            <div class="box box-huge-x">
                <img src="images/logo.svg" class="card-image">
                <div class="box-info">
                    <div class="box-title">placeholder</div>
                    <div class="box-data">placeholder</div>
                    <div class="box-data-2">placeholder</div>
                </div>
            </div>
            <div class="box box-huge-x">
                <img src="images/logo.svg" class="card-image">
                <div class="box-info">
                    <div class="box-title">placeholder</div>
                    <div class="box-data">placeholder</div>
                    <div class="box-data-2">placeholder</div>
                </div>
            </div>
            <div class="box box-huge-x">
                <img src="images/logo.svg" class="card-image">
                <div class="box-info">
                    <div class="box-title">placeholder</div>
                    <div class="box-data">placeholder</div>
                    <div class="box-data-2">placeholder</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
